name: wine_ai
description: "Wine AI - Social Survival Tool for Business Dinners"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # Database
  sqflite: ^2.3.2
  sqflite_common_ffi_web: ^0.4.2+3
  path: ^1.9.0
  path_provider: ^2.1.3
  
  # Image handling
  image_picker: ^1.1.2
  image_picker_for_web: ^3.0.6
  
  # HTTP
  http: ^1.2.2
  
  # JSON
  json_annotation: ^4.9.0
  
  # Crypto for fingerprinting
  crypto: ^3.0.5
  
  # Environment variables
  flutter_dotenv: ^5.2.1
  
  # Charts for taste profile
  fl_chart: ^0.68.0
  
  # Animations
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
