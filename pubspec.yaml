name: wine_ai
description: "Wine AI - Social Survival Tool for Business Dinners"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  provider: ^6.1.2

  # Database
  sqflite: ^2.3.2
  sqflite_common_ffi_web: ^0.4.2+3
  path: ^1.9.0

  # Image handling
  image_picker: ^1.1.2

  # HTTP
  http: ^1.2.2

  # Crypto for fingerprinting
  crypto: ^3.0.5

  # Environment variables
  flutter_dotenv: ^5.2.1

  # Sharing functionality
  share_plus: ^10.0.0

  # Image capture for sharing
  screenshot: ^3.0.0

  # Path provider for saving images
  path_provider: ^2.1.0

  # Internationalization
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # Local storage
  shared_preferences: ^2.3.2

  # Hive NoSQL database
  hive: ^2.2.3
  hive_flutter: ^1.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - .env
    - assets/images/
